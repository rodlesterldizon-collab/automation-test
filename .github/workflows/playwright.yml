name: Playwright Tests
on:
  push:
    branches: [ main, master, test-playwright-docker ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Which test suite to run?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api
          - ui
          - llm

permissions:
  contents: write
  pull-requests: write

jobs:
  api-tests:
    name: Run API Tests
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.test_suite == 'all' || inputs.test_suite == 'api' }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    env:
      HOME: /root
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install Project Dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run API Tests
      env:
        REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
      run: npm run test:api
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-api
        path: playwright-report/
        retention-days: 30

  ui-tests:
    name: Run UI Tests
    needs: [api-tests]
    # Use !failure() so this job runs if api-tests is skipped, but stops if api-tests fails
    if: ${{ always() && !failure() && !cancelled() && (github.event_name != 'workflow_dispatch' || inputs.test_suite == 'all' || inputs.test_suite == 'ui') }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    env:
      HOME: /root
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install Project Dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run UI Tests
      run: npm run test:cli
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-ui
        path: playwright-report/
        retention-days: 30

  llm-tests:
    name: Run LLM API Tests
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.test_suite == 'all' || inputs.test_suite == 'llm' }}
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
    - name: Install Project Dependencies
      run: npm ci
    - name: Cache Promptfoo
      uses: actions/cache@v4
      with:
        path: ~/.promptfoo/cache
        key: ${{ runner.os }}-promptfoo-${{ hashFiles('**/promptfooconfig.yaml') }}
        restore-keys: |
          ${{ runner.os }}-promptfoo-
    - name: Run LLM Tests
      id: llm_test_run
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        if [[ -n "${{ secrets.GROQ_API_KEY }}" ]]; then
          npm run test:llm:groq
        else
          npm run test:llm:gemini
        fi
    - name: Upload Promptfoo Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: promptfoo-report
        path: report.html
        retention-days: 30

  accessibility-tests:
    name: Run Accessibility Scans
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.test_suite == 'all' || inputs.test_suite == 'ui' }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    env:
      HOME: /root
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install Project Dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Accessibility Scans
      continue-on-error: true
      run: npx playwright test --project=accessibility
      env:
        URL_LIST: "https://atlas.gc.ca/toporama/en/index.html,https://broken-workshop.dequelabs.com/"
    - name: Upload Accessibility Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: accessibility-reports
        path: tests/accessibility/reports/
        retention-days: 30