name: Playwright Tests
on:
  push:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - uses: actions/setup-node@v4
      with:
        node-version: 24 # Updated to avoid Node 20 deprecation warnings

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test

    - name: Install Copilot CLI
      if: failure()
      run: npm install -g @github/copilot@latest

    - name: Run Playwright Test Healer on Failure
      if: failure()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Tests failed. Starting AI Healer agent..."
        copilot -p "The tests failed in CI. Use the tools to diagnose, fix the code, and verify the fix." \
                --agent playwright-test-healer \
                --autopilot \
                --allow-all

    - name: Commit and Push AI Fixes
      if: failure()
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "fix: AI-generated healing for failing tests" || echo "No changes to commit"
        git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30