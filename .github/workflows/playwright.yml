name: Playwright Tests
on:
  push:
    branches: [ main, master, test-playwright-docker ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Which test suite to run?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api
          - ui

permissions:
  contents: write
  pull-requests: write

jobs:
  api-tests:
    name: Run API Tests
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.test_suite == 'all' || inputs.test_suite == 'api' }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    env:
      HOME: /root
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install Project Dependencies
      run: npm ci
    - name: Run API Tests
      env:
        REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
      run: npm run test:api
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-api
        path: playwright-report/
        retention-days: 30

  ui-tests:
    name: Run UI Tests
    needs: [api-tests]
    # Use !failure() so this job runs if api-tests is skipped, but stops if api-tests fails
    if: ${{ always() && !failure() && !cancelled() && (github.event_name != 'workflow_dispatch' || inputs.test_suite == 'all' || inputs.test_suite == 'ui') }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    env:
      HOME: /root
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install Project Dependencies
      run: npm ci
    - name: Run UI Tests
      run: npm run test:cli
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-ui
        path: playwright-report/
        retention-days: 30