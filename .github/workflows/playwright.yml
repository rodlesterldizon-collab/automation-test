name: Playwright Tests
on:
  push:
    branches: [ main, master, test-playwright-docker ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Which test suite to run?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api
          - ui

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # 🐋 Using the free Microsoft container with Playwright pre-installed
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy

    # 🔑 Firefox permission fix: Set HOME=/root so Firefox owns its sandbox
    # 🚀 Opt-in to Node 24 for actions to resolve deprecation warnings
    env:
      HOME: /root
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Project Dependencies
      run: npm ci

    - name: Run API Tests
      if: ${{ github.event_name != 'workflow_dispatch' || inputs.test_suite == 'all' || inputs.test_suite == 'api' }}
      env:
        REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
      run: npm run test:api

    - name: Run UI Tests
      if: ${{ success() && (github.event_name != 'workflow_dispatch' || inputs.test_suite == 'all' || inputs.test_suite == 'ui') }}
      run: npm run test:cli

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30