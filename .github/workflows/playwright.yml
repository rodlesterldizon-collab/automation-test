name: Playwright Tests
on:
  push:
    branches: [ main, master, test-playwright-docker ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # 🐋 Using the free Microsoft container with Playwright pre-installed
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy

    # 🔑 Firefox permission fix: Set HOME=/root so Firefox owns its sandbox
    # 🚀 Opt-in to Node 24 for actions to resolve deprecation warnings
    env:
      HOME: /root
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Project Dependencies
      run: npm ci

    - name: Run Playwright tests
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30