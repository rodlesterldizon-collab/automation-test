name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# 1. ADDED: Permissions to allow the AI to commit fixes
permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        # 2. ADDED: Fetch-depth 0 ensures the AI can see the full git history if needed
        fetch-depth: 0 

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test

    - name: Install Copilot CLI
      if: failure()
      run: npm install -g @github/copilot@latest

    - name: Run Playwright Test Healer on Failure
      if: failure()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Tests failed. Starting AI Healer agent..."
        # 3. UPDATED: Pointing specifically to your agent file path
        copilot -p "The tests failed in CI. Use the tools to fix the code." \
                --agent .github/agents/playwright-test-healer.agent.md \
                --autopilot \
                --allow-all

    - name: Commit and Push AI Fixes
      if: failure()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 4. ADDED: Identify the bot and push the fixes back to the PR
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "fix: AI-generated healing for failing tests" || echo "No changes to commit"
        git push origin ${{ github.head_ref || github.ref_name }}

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30