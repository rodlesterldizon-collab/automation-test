description: "LLM API Evaluation"

prompts:
  - "{{prompt}}"

providers:
  - id: google:gemini-3.5-flash
    config:
      # Shorten timeout to 20 seconds to fail fast on rate limits
      timeout: 20000
  - id: file://groqProvider.js
    config:
      model: "llama-3.1-8b-instant"

defaultTest:
  assert:
    - type: llm-rubric
      value: "Evaluate if the model output is at least 80% (0.8) accurate and grounded compared to the expected answer. Expected: {{expected}}"
      provider:
        id: file://groqProvider.js
        config:
          model: "llama-3.1-8b-instant"

tests: golden-dataset.csv
